name: Java CI defectuós

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Descarrega el codi
        uses: actions/checkout@v4

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verifica versions
        run: |
          java -version
          mvn -v

      - name: Compila i executa proves
        run: mvn clean test